##### transparent background #####
set -g status-style "bg=default,fg=#b3b1ad"

##### separators #####
set -g window-status-separator ""

##### left / center / right #####
set -g status-left-length 100
set -g status-right-length 100

# LEFT: current session name + other sessions
set -g status-left "#[fg=#1f2430,bg=#aad94c,bold]  #S #[fg=#aad94c,bg=default,nobold] #[fg=#95e6cb,bg=default]#(~/.config/tmux/scripts/tmux-other-sessions.sh) "

# CENTER: current session windows
set -g status-format[0] "#[align=centre]#[fg=#59c2ff,bg=default]#(~/.config/tmux/scripts/tmux-current-windows.sh)"

# RIGHT: battery + date + time
set -g status-right "#[fg=#ffb454,bg=default]#(~/.config/tmux/scripts/tmux-battery.sh) #[fg=#707a8c,bg=default]│ #[fg=#ffd173,bg=default]%Y-%m-%d #[fg=#707a8c,bg=default]│ #[fg=#59c2ff,bg=default]%H:%M "

##### pane / message styling #####
set -g message-style "bg=default,fg=#ffd173"
set -g message-command-style "bg=default,fg=#ffb454"

set -g pane-border-style "fg=#3a4152"
set -g pane-active-border-style "fg=#59c2ff"

##### window list fallback styling #####
# Not heavily used because windows are rendered by script, but good to keep sane defaults.
set -g window-status-format "#[fg=#707a8c,bg=default] #I:#W "
set -g window-status-current-format "#[fg=#1f2430,bg=#59c2ff,bold] #I:#W "

##### mode styling #####
set -g mode-style "bg=#ffd173,fg=#1f2430,bold"
